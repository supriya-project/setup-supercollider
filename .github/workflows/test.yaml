name: Test

on:
  push:
    branches:
    - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: package.json
    - run: npm install
    - run: npm run build
    - run: npm run check
    - uses: typesafegithub/github-actions-typing@v2

  end-to-end:
    name: End-to-end
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: package.json
    - run: npm install
    - run: npm run build
    - uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}
        restore-keys: ${{ runner.os }}
    - uses: ./
      id: action
    - name: Validate PATH updates
      run: |
        sclang -v
        scsynth -v
        supernova -v
    - name: Validate action outputs
      run: |
        ${{ steps.action.outputs.sclang_path }} -v
        ${{ steps.action.outputs.scsynth_path }} -v
        ${{ steps.action.outputs.supernova_path }} -v
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-latest, windows-latest]
